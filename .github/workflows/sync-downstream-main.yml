name: Sync downstream fork main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync JJerryJi/130project main
    runs-on: ubuntu-latest

    steps:
      - name: Sync downstream fork
        env:
          DOWNSTREAM_SYNC_TOKEN: ${{ secrets.DOWNSTREAM_SYNC_TOKEN }}
          DOWNSTREAM_REPOSITORY: JJerryJi/130project
          DOWNSTREAM_BRANCH: main
        run: |
          set -euo pipefail

          if [ -z "${DOWNSTREAM_SYNC_TOKEN}" ]; then
            echo "::error::Missing DOWNSTREAM_SYNC_TOKEN secret with write access to ${DOWNSTREAM_REPOSITORY}."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(
            curl -sS -L -o "${response_file}" -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DOWNSTREAM_SYNC_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${DOWNSTREAM_REPOSITORY}/merge-upstream" \
              -d "{\"branch\":\"${DOWNSTREAM_BRANCH}\"}"
          )"

          cat "${response_file}"
          echo

          case "${status_code}" in
            200|201|202|204)
              echo "Synced ${DOWNSTREAM_REPOSITORY}:${DOWNSTREAM_BRANCH} with upstream."
              ;;
            409)
              echo "::error::Could not sync automatically because the downstream fork has conflicts."
              exit 1
              ;;
            *)
              echo "::error::GitHub API returned HTTP ${status_code} while syncing ${DOWNSTREAM_REPOSITORY}:${DOWNSTREAM_BRANCH}."
              exit 1
              ;;
          esac
